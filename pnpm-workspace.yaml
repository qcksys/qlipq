packages:
  - apps/*
  - "!apps/desktop" # Rust + iced app (own Cargo workspace, not a pnpm member)
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@base-ui/react": ^1.6.0
  "@fontsource-variable/geist": ^5.2.9
  "@tailwindcss/vite": ^4.3.1
  "@types/node": ^24
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  esbuild: ^0.28.1
  lucide-react: ^1.21.0
  next-themes: ^0.4.6
  shadcn: ^4.12.0
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.1
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
