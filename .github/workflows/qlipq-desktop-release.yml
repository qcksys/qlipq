name: qlipq-desktop release

# Build the desktop app and attach the binaries + Windows installer to the GitHub Release that
# release-please publishes for a `vX.Y.Z` tag. (Versioning/tagging lives in release-please — see
# release-please-config.json. The release-please job must use a PAT, or publishing the Release won't
# trigger this workflow.)
on:
  release:
    types: [published]
  # Manual/backfill build of an existing tag (e.g. a release whose tag was created before this
  # workflow, or one made with GITHUB_TOKEN so `release: published` never fired). The workflow file
  # comes from the ref you dispatch, but the code is checked out at `tag`.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: qlipq.exe
            asset: qlipq-windows-x64.zip
          - os: ubuntu-latest
            bin: qlipq
            asset: qlipq-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      # On a `release` event this is the release's tag; on manual dispatch it's the `tag` input.
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Install Linux GUI build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev libasound2-dev

      # The shipped binary links FFmpeg in process (libav) — the LGPL shared build below is bundled
      # with the release so users need no external ffmpeg/ffprobe.
      - name: Set up LGPL FFmpeg SDK
        uses: ./.github/actions/setup-ffmpeg

      # Release build of the `qlipq` binary against the in-process libav stack (no CLI fallback). On
      # Linux, rpath `$ORIGIN/lib` makes the binary load the FFmpeg .so bundled alongside it.
      - name: Build release binary
        run: cargo build --release -p qlipq-desktop
        env:
          RUSTFLAGS: ${{ matrix.os == 'ubuntu-latest' && '-C link-arg=-Wl,-rpath,$ORIGIN/lib' || '' }}

      # Bundle the FFmpeg DLLs next to qlipq.exe (Windows loads DLLs from the exe's dir first) plus the
      # FFmpeg LGPL license text.
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.bin }} dist/
          Copy-Item "$env:FFMPEG_DLL_DIR/*.dll" dist/
          Copy-Item "$env:FFMPEG_SDK/LICENSE.txt" dist/FFMPEG-LICENSE.txt
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset }}

      # Wrap the same dist/ into a Setup.exe (Start-menu shortcut + uninstaller). Additive — the
      # portable .zip above is still produced and attached.
      - name: Build Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = ("${{ github.event.inputs.tag || github.ref_name }}").TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer/qlipq.iss

      # Bundle the FFmpeg .so into dist/lib (found via the binary's $ORIGIN/lib rpath) plus the license.
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist/lib
          cp target/release/${{ matrix.bin }} dist/
          cp -P "$FFMPEG_LIBS_DIR"/*.so* dist/lib/
          cp "$FFMPEG_SDK/LICENSE.txt" dist/FFMPEG-LICENSE.txt
          tar -czf "${{ matrix.asset }}" -C dist .

      # `files:` is repo-root-relative (the action ignores `working-directory`). Attaches the assets to
      # the release for this tag — updating release-please's published Release on a `release` event, or
      # creating one on manual dispatch (no `draft:`, so it stays/becomes published & downloadable).
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # The installer path only exists on the Windows leg; action-gh-release ignores unmatched
          # globs (fail_on_unmatched_files defaults to false), so the Linux leg just skips it.
          files: |
            apps/desktop/${{ matrix.asset }}
            apps/desktop/installer/Output/qlipq-setup-x64.exe
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
