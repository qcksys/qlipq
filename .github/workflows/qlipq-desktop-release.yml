name: qlipq-desktop release

# Build the desktop app and attach binaries to a GitHub Release on a `v*` tag.
# (Versioning/tagging is separate — see the release strategy in the repo docs.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: qlipq.exe
            asset: qlipq-windows-x64.zip
          - os: ubuntu-latest
            bin: qlipq
            asset: qlipq-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Install Linux GUI build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev

      # Release build of the `qlipq` binary. libav-preview is the default feature, but it needs a
      # machine-specific FFmpeg dev build (gitignored `.cargo/config.toml`) and can't ship (LGPL), so
      # CI ships the dependency-light CLI-preview path.
      - name: Build release binary
        run: cargo build --release -p qlipq-desktop --no-default-features

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target/release/${{ matrix.bin }} -DestinationPath ${{ matrix.asset }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf "${{ matrix.asset }}" -C target/release "${{ matrix.bin }}"

      # `files:` is repo-root-relative (the action ignores `working-directory`).
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/${{ matrix.asset }}
          draft: true
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
