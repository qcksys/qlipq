name: Desktop (C#)

on:
  push:
    branches: [main]
    paths: ["desktop/**", ".github/workflows/dotnet-desktop.yml"]
  pull_request:
    paths: ["desktop/**", ".github/workflows/dotnet-desktop.yml"]

# Cancel superseded runs on the same ref.
concurrency:
  group: dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Pure libraries + their parity tests (these are the migration's correctness gate).
      - name: Test shared libraries
        run: |
          dotnet test tests/Qlipq.Core.Tests/Qlipq.Core.Tests.csproj -c Release
          dotnet test tests/Qlipq.Ffmpeg.Tests/Qlipq.Ffmpeg.Tests.csproj -c Release

      # WinUI 3 app (x64): compiles XAML + C#. MSIX packaging runs in the release workflow.
      - name: Build WinUI app
        run: dotnet build src/Qlipq.App/Qlipq.App.csproj -c Release -p:Platform=x64
