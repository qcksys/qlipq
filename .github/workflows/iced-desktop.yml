name: Desktop (Rust / iced)

on:
  push:
    branches: [main]
    paths: ["iced/**", ".github/workflows/iced-desktop.yml"]
  pull_request:
    paths: ["iced/**", ".github/workflows/iced-desktop.yml"]

concurrency:
  group: iced-${{ github.ref }}-${{ matrix.os }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: iced
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: iced -> target

      - name: Install Linux GUI build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev

      # The pure crates are the migration's correctness gate (ffmpeg-arg parity + domain logic).
      - name: Test shared crates
        run: cargo test -p qlipq-core -p qlipq-ffmpeg

      # Compile the cross-platform iced app (running needs a display + ffmpeg on PATH).
      - name: Build iced app
        run: cargo build -p qlipq-iced
