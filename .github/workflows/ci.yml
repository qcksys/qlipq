name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      # Generate Astro's `.astro/types.d.ts` (astro:content + `?raw` module types). It's gitignored,
      # so without this `vp check` fails to resolve those virtual modules on a fresh checkout.
      - name: Generate Astro types
        run: vp run qlipq-website#sync

      - name: Format, lint & type check
        run: vp check

      - name: Test
        run: vp run -r test

      - name: Build website
        run: vp run -r build
