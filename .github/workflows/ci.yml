name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - name: Install FFmpeg (for ffmpeg integration tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Format, lint & type check
        run: vp check

      - name: Test
        run: vp run -r test

      - name: Build packages, website & app frontend
        run: vp run -r build
