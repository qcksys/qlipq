name: Desktop

on:
  push:
    branches: [main]
    paths: ["apps/desktop/**", ".github/workflows/build-desktop.yml"]
  pull_request:
    paths: ["apps/desktop/**", ".github/workflows/build-desktop.yml"]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    concurrency:
      group: desktop-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Install Linux GUI build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev

      # The app links FFmpeg's libraries in process (libav) — the only media path now. Pull the LGPL
      # FFmpeg SDK and export the FFMPEG_* env the build needs (mirrors the local .cargo/config.toml).
      - name: Set up LGPL FFmpeg SDK
        uses: ./.github/actions/setup-ffmpeg

      # The pure crates are the correctness gate (encode planning + domain logic).
      - name: Test shared crates
        run: cargo test -p qlipq-core -p qlipq-ffmpeg

      # Compile the desktop app against the in-process libav stack (the sole build — no CLI fallback).
      - name: Build desktop app
        run: cargo build -p qlipq-desktop
