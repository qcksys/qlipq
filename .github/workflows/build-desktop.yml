name: Desktop

on:
  push:
    branches: [main]
    paths: ["apps/desktop/**", ".github/workflows/build-desktop.yml"]
  pull_request:
    paths: ["apps/desktop/**", ".github/workflows/build-desktop.yml"]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    concurrency:
      group: desktop-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Install Linux GUI build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev

      # The pure crates are the correctness gate (ffmpeg-arg + domain logic).
      - name: Test shared crates
        run: cargo test -p qlipq-core -p qlipq-ffmpeg

      # Compile the desktop app. libav-preview is the default feature, but it needs a local FFmpeg
      # SDK (wired via the gitignored .cargo/config.toml), so CI builds the dependency-light CLI path.
      - name: Build desktop app
        run: cargo build -p qlipq-desktop --no-default-features
